<html>
    <head>
        <title>Personal Profile Web Application</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
        
        <style>
            body{
                background-color: #F5F5DC !important;
                color:#2D2D2D;
            }
            .custom-card{
                border: 2px solid #800000 !important;
                background-color: #ffffff;
            }
            .card-header-maroon{
                background-color: #800000 !important;
                color: #F5F5DC !important;
            }
            .btn-maroon{
                background-color: #800000 !important;
                color: #F5F5DC !important;
                border:none;
                transition: 0.3s;
            }
            .btn-maroon:hover{
                background-color: #4A0E0E !important;
                color: #ffffff !important;
            }
            .form-control:focus{
                border-color: #800000 !important;
                box-shadow: 0 0 0 0.25rem rgba(128, 0, 0, 0.25) !important;
            }
            .form-label{
                color: #4A0E0E
            }
        </style>
    </head>
    <body>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-header py-3 text-center" style="background-color: #800000 !important; color: #F5F5DC !important;">
                            <h3 class="mb-0 fw-bold" style="color: #F5F5DC !important;"><i class="bi bi-person-plus-fill me-2"></i>Profile Registration</h3>
                        </div>
                        <div class="card-body p-4">
                            
                            <form action="ProfileServlet" method="POST">
                                
                                <div class="mb-3">
                                    <label for="name" class="form-label fw-semibold">Full Name:</label>
                                    <input type="text" class="form-control" id="name" name="name" required placeholder="Full Name">
                                </div>
                                      
                                <div class="mb-3">
                                    <label for="studentID" class="form-label fw-semibold">Student ID:</label>
                                    <input type="text" class="form-control" id="studentID" name="studentID" required placeholder="2024275050">
                                </div>
                                
                                <div class="mb-3">
                                    <label for="program" class="form-label fw-semibold">Program Code:</label>
                                    <input type="text" class="form-control" id="programme" name="programme" required placeholder="CDCS266">
                                </div>
                                
                                <div class="mb-3">
                                    <label for="email" class="form-label fw-semibold">Email:</label>
                                    <input type="text" class="form-control" id="email" name="email" required placeholder="2024275050@student.uitm.edu.my">
                                </div>
                                
                                <div class="mb-3">
                                    <label for="hobbies" class="form-label fw-semibold">Hobbies:</label>
                                    <input type="text" class="form-control" id="hobbies" name="hobbies" required placeholder="Read Novel, Watch Movie, Listen Music">
                                </div>
                                
                                <div class="mb-4">
                                    <label for="bio" class="form-label fw-semibold">Short Introduction About Yourself:</label>
                                    <textarea class="form-control" id="introduction" name="introduction" required placeholder="Tell us a bit about yourself..."></textarea>
                                </div>
                                
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-lg fw-semibold" style="background-color: #800000 !important; color: #F5F5DC !important; border: none !important;">
                                        Generate Profile <i class="bi bi-arrow-right border-start ms-2 ps-2" style="color: #F5F5DC !important;"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
